name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Verify
        run: make verify VERSION="${GITHUB_REF_NAME}"

      - name: Build release binaries
        run: make clean build-all VERSION="${GITHUB_REF_NAME}"

      - name: Verify embedded version
        run: |
          version_output="$(./bin/rdtui-linux-amd64 --version)"
          expected="rdtui ${GITHUB_REF_NAME}"
          if [ "$version_output" != "$expected" ]; then
            printf 'expected %s, got %s\n' "$expected" "$version_output"
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd bin
          sha256sum rdtui-* > checksums.txt

      - name: Sign checksums
        run: |
          cosign sign-blob \
            --yes \
            --bundle bin/checksums.txt.sigstore.json \
            bin/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              bin/rdtui-* \
              bin/checksums.txt \
              bin/checksums.txt.sigstore.json \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              bin/rdtui-* \
              bin/checksums.txt \
              bin/checksums.txt.sigstore.json \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
          fi
